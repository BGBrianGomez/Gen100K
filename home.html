<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio | Academia Privada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="home" class="home-main">
    <div class="page-shell">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>

      <header class="topbar">
        <div>
          <span class="eyebrow">Menu principal</span>
        </div>
        <button id="logoutButton" class="ghost-button" type="button">
          Salir
        </button>
      </header>

      <main class="home-layout">
        <section class="hero-panel">
          <div class="hero-copy">
            <span class="hero-badge">Academia premium</span>
            <h2>Este contenido esta pensado para llevarte a otro nivel.</h2>
            <p>
              Contenido organizado por areas con una experiencia simple, privada
              y lista para ampliar.
            </p>
          </div>
        </section>

        <section class="categories-section">
          <div id="categoriesGrid" class="categories-grid"></div>
        </section>
      </main>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
