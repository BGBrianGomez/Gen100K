<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categoria | Academia Privada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="categoria">
    <div class="page-shell">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>

      <header class="topbar topbar-category">
        <div>
          <a class="back-link" href="home.html">
            <span class="back-link-icon" aria-hidden="true">‹</span>
            <span>Volver al menu</span>
          </a>
          <h1 id="categoryTitle">Categoria</h1>
        </div>
        <button id="logoutButton" class="ghost-button" type="button">
          Salir
        </button>
      </header>

      <main class="course-layout">
        <section class="video-panel">
          <div class="video-frame-wrapper">
            <div
              id="videoLoader"
              class="video-loader active"
              aria-live="polite"
            >
              <div class="video-loader-spinner"></div>
              <p>Cargando video...</p>
            </div>
            <iframe
              id="mainVideo"
              class="video-frame"
              src=""
              title="Video principal"
              allow="
                accelerometer;
                autoplay;
                clipboard-write;
                encrypted-media;
                gyroscope;
                picture-in-picture;
                web-share;
              "
              allowfullscreen
            ></iframe>
          </div>
          <div class="video-meta">
            <span class="eyebrow">Reproduciendo</span>
            <h2 id="mainVideoTitle">Selecciona un video</h2>
            <div id="videoResource" class="video-resource" hidden>
              <a
                id="videoResourceLink"
                class="video-resource-link"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                >Abrir recurso</a
              >
            </div>
            <div class="video-extra-actions">
              <a
                class="video-resource-link video-resource-link-secondary"
                href="https://drive.google.com/drive/folders/1Yvh9w_-lCwu4QTAm9EXv1Ev1pfIYB43F?usp=sharing"
                target="_blank"
                rel="noopener noreferrer"
                >Drive de imagenes y videos</a
              >
              <a
                class="video-resource-link video-resource-link-secondary"
                href="https://drive.google.com/drive/u/0/folders/1nZZ2B8UW8nPbjrPc_-nEhVn-wNsKfCCf"
                target="_blank"
                rel="noopener noreferrer"
                >Frases</a
              >
            </div>
          </div>
        </section>

        <aside class="playlist-panel">
          <div class="playlist-header">
            <span class="eyebrow">Capitulos</span>
            <p id="playlistCount">0 videos</p>
          </div>
          <div id="videoList" class="video-list"></div>
        </aside>
      </main>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
