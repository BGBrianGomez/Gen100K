<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Privado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="login">
  <div class="page-shell page-shell-login">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <main class="login-layout">
      <section class="login-card">
        <span class="eyebrow">Acceso privado</span>
        <h1>Plataforma de Capacitacion</h1>
        <p class="login-copy">Ingresa la clave global para continuar.</p>

        <form id="loginForm" class="login-form">
          <label class="field-label" for="password">Clave de acceso</label>
          <input
            id="password"
            class="text-input"
            type="password"
            placeholder="Ingresa la clave"
            autocomplete="current-password"
          >
          <button class="primary-button" type="submit">Ingresar</button>
          <p id="loginError" class="error-message" aria-live="polite"></p>
        </form>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
